name: Deploy

on:
  workflow_run:
    workflows: ['Build and Push']
    types:
      - completed
    branches: ['main']

jobs:
  update-gitops:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v3
        with:
          repository: aeonamind/gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: main

      - name: Update image tag in values.yaml
        run: |
          sed -i "s/^  tag: .*/  tag: ${{ github.event.workflow_run.head_sha }}/" infra/sound-bot/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/sound-bot/values.yaml
          git commit -m "chore(sound-bot): deploy ${{ github.event.workflow_run.head_sha }}"
          git push
